  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }

    // Mobile: hide header "Request Demo", show it inside the hamburger panel; link hover glow.
    (function senzaiMobileNavEnhancements() {
      if (document.querySelector('style[data-senzai-mob-nav]')) return;
      var css = document.createElement('style');
      css.setAttribute('data-senzai-mob-nav', 'true');
      // Drawer link is hidden everywhere except mobile menu open (beats bundle .nav-links a rules on desktop).
      css.textContent =
        'header.nav .nav-links a.nav-cta-drawer{display:none!important;}' +
        '@media (min-width:901px){' +
        'header.nav{display:grid!important;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);' +
        'align-items:center;column-gap:clamp(16px,3vw,32px);padding-left:var(--pad);padding-right:var(--pad);}' +
        'header.nav .nav-brand{grid-column:1;justify-self:start;margin-right:0;}' +
        'header.nav nav.nav-links{grid-column:2;justify-self:center;margin-left:0;margin-right:0;}' +
        'header.nav>a.nav-cta{grid-column:3;justify-self:end;margin-left:0;border-radius:999px;}' +
        '}' +
        '@media (max-width:900px){' +
        '.nav{justify-content:flex-start;gap:10px;}' +
        '.nav-brand{margin-right:auto;}' +
        '.nav-mob-toggle{order:3;margin-left:0;}' +
        'header.nav>a.nav-cta{display:none!important;}' +
        'header.nav.nav-mob-open .nav-links>a.nav-cta-drawer{' +
        'display:flex!important;align-items:center;justify-content:center;gap:8px;' +
        'width:100%;box-sizing:border-box;margin-top:10px;padding:14px 22px!important;' +
        'border-radius:999px;border-bottom:none!important;' +
        'border-top:1px solid var(--bdr);' +
        'background:linear-gradient(135deg,#152670 0%,#2A3375 35%,#2B75A9 65%,#47B1BF 100%);' +
        'color:#fff!important;font-family:var(--f-d);font-size:14px;font-weight:700;' +
        'box-shadow:0 10px 30px rgba(21,38,112,.5);transition:filter .2s ease,box-shadow .2s ease;' +
        '}' +
        'header.nav.nav-mob-open .nav-links>a.nav-cta-drawer:hover{' +
        'filter:brightness(1.08);box-shadow:0 12px 36px rgba(71,177,191,.55);' +
        '}' +
        '.nav-mob-open .nav-links>a:not(.nav-cta-drawer){' +
        'transition:color .2s ease,text-shadow .2s ease,transform .2s ease;' +
        '}' +
        '.nav-mob-open .nav-links>a:not(.nav-cta-drawer):hover{' +
        'color:var(--text)!important;' +
        'text-shadow:0 0 20px rgba(93,200,214,.85),0 0 42px rgba(71,177,191,.55);' +
        'transform:translateX(6px);' +
        '}' +
        '}';
      document.head.appendChild(css);

      function installDrawerCta() {
        var nav = document.querySelector('header.nav[data-nav]') || document.querySelector('header.nav');
        if (!nav) return;
        var links = nav.querySelector('.nav-links');
        var cta = nav.querySelector(':scope > a.nav-cta');
        if (!links || !cta) return;
        if (links.querySelector('a.nav-cta-drawer')) return;
        var drawer = cta.cloneNode(true);
        drawer.classList.add('nav-cta-drawer');
        links.appendChild(drawer);
      }
      installDrawerCta();
    })();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

27Space Grotesk\u0027;\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"a5af5bfb-f3e2-4330-a6cd-2bd24a248ae2\") format(\u0027woff2\u0027);\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: \u0027Space Grotesk\u0027;\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"a0de764e-03b4-418b-8f7c-b063aa8ba2c5\") format(\u0027woff2\u0027);\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: \u0027Space Grotesk\u0027;\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"8385cbd0-0fa0-4ec8-8fd4-02fdcbbbaf3f\") format(\u0027woff2\u0027);\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n/* Responsive patch: mobile-first hardening */\nhtml, body { max-width: 100%; overflow-x: clip; }\n* { box-sizing: border-box; }\nimg, video, svg, canvas, iframe { max-width: 100%; height: auto; }\n\n.stage-inner, .foot-inner, .nav {\n  width: min(100% - 2rem, var(--container));\n}\n\n.hero-inner, .hero-sub {\n  max-width: 100%;\n}\n\n.hero-ctas {\n  flex-wrap: wrap;\n  gap: 0.75rem;\n}\n\n.btn, button, input, select, textarea {\n  max-width: 100%;\n}\n\ninput, select, textarea, button, .btn, .nav-cta {\n  min-height: 44px;\n}\n\n.problem-grid,\n.split,\n.radar-wrap,\n.pf-board,\n.agents,\n.mk-grid,\n.testi-grid,\n.af-back-grid {\n  min-width: 0;\n}\n\n.pf-board,\n.mk-grid,\n.testi-grid,\n.agents {\n  grid-template-columns: 1fr;\n}\n\ntable {\n  display: block;\n  width: 100%;\n  overflow-x: auto;\n  -webkit-overflow-scrolling: touch;\n}\n\n@media (min-width: 425px) {\n  .pf-board,\n  .mk-grid,\n  .testi-grid,\n  .agents {\n    grid-template-columns: repeat(2, minmax(0, 1fr));\n  }\n}\n\n@media (max-width: 768px) {\n  .nav {\n    width: calc(100% - 1rem);\n  }\n\n  .nav-mob-open .nav-links {\n    max-width: calc(100vw - 1rem);\n    left: 0.5rem;\n    right: 0.5rem;\n  }\n\n  .hero-title {\n    word-break: break-word;\n  }\n\n  .split-art,\n  .tilt,\n  .tilt-flip {\n    max-width: 100%;\n    transform-origin: center top;\n  }\n}\n\n@media (min-width: 768px) {\n  .mk-grid,\n  .testi-grid,\n  .agents {\n    grid-template-columns: repeat(2, minmax(0, 1fr));\n  }\n}\n\n@media (min-width: 1024px) {\n  .mk-grid,\n  .testi-grid,\n  .agents {\n    grid-template-columns: repeat(3, minmax(0, 1fr));\n  }\n\n  .pf-board {\n    grid-template-columns: repeat(5, minmax(0, 1fr));\n  }\n}\n\n@media (min-width: 1440px) {\n  .stage-inner, .foot-inner, .nav {\n    width: min(100% - 4rem, var(--container));\n  }\n}\n\u003c/style\u003e\n\u003cstyle\u003e/* ============================================================\n   SENZAI Microsite — Pass 1\n   Dark cinematic. Persistent 3D scene. Layered scroll.\n   ============================================================ */\n\n:root {\n  /* Brand — Senzai logo gradient */\n  --senzai-navy:        #152670;\n  --senzai-blue:        #2A3375;\n  --senzai-mid:         #2B75A9;\n  --senzai-teal:        #47B1BF;\n  --senzai-teal-bright: #5DC8D6;\n  --senzai-gradient: linear-gradient(135deg, #152670 0%, #2A3375 30%, #2B75A9 65%, #47B1BF 100%);\n  --senzai-gradient-text: linear-gradient(135deg, #5DC8D6 0%, #47B1BF 40%, #2B75A9 100%);\n\n  /* Surfaces */\n  --bg-0: #04060d;\n  --bg-1: #06080F;\n  --bg-2: #090C17;\n  --surf:  #0D1828;\n  --surf-2:#111F35;\n  --surf-3:#16263E;\n  --bdr:   rgba(71, 177, 191, 0.12);\n  --bdr-2: rgba(71, 177, 191, 0.24);\n  --bdr-3: rgba(71, 177, 191, 0.40);\n\n  /* Text */\n  --text:  #F1F5FF;\n  --text-2:#A8BCDC;\n  --text-3:#5C6F8C;\n\n  /* CTA */\n  --cta:   #47B1BF;\n  --cta-h: #5DC8D6;\n\n  /* Status */\n  --ok: #22C55E;\n  --warn: #F59E0B;\n\n  /* Type */\n  --f-d: \u0027Space Grotesk\u0027, system-ui, sans-serif;\n  --f-b: \u0027Inter\u0027, system-ui, sans-serif;\n  --f-m: \u0027JetBrains Mono\u0027, ui-monospace, monospace;\n\n  --container: 1180px;\n  --pad: 32px;\n}\n\n* { margin: 0; padding: 0; box-sizing: border-box; }\nhtml { scroll-behavior: smooth; background: var(--bg-1); overflow-x: hidden; scroll-snap-type: y proximity; }\nbody {\n  background: var(--bg-1);\n  color: var(--text);\n  font-family: var(--f-b);\n  font-size: 16px;\n  line-height: 1.6;\n  -webkit-font-smoothing: antialiased;\n  overflow-x: hidden;\n  min-height: 100vh;\n}\n\nimg { display: block; max-width: 100%; }\nul { list-style: none; }\na { color: inherit; text-decoration: none; }\n\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after {\n    animation-duration: 0.01ms !important;\n    transition-duration: 0.01ms !important;\n  }\n}\n\n/* ============================================================\n   PERSISTENT 3D WORLD — fixed behind content\n   ============================================================ */\n.world {\n  position: fixed;\n  inset: 0;\n  opacity: .78;\n  z-index: 0;\n  pointer-events: none;\n  overflow: hidden;\n  perspective: 1400px;\n  transform-style: preserve-3d;\n}\n\n.world-bg { position: absolute; inset: 0; }\n\n/* Stars */\n.world-stars {\n  position: absolute; inset: 0;\n  background-image:\n    radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.5), transparent),\n    radial-gradient(1px 1px at 60% 70%, rgba(93,200,214,.4), transparent),\n    radial-gradient(1px 1px at 80% 20%, rgba(255,255,255,.3), transparent),\n    radial-gradient(1px 1px at 30% 80%, rgba(93,200,214,.3), transparent),\n    radial-gradient(2px 2px at 90% 50%, rgba(255,255,255,.25), transparent),\n    radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,.4), transparent),\n    radial-gradient(1px 1px at 50% 10%, rgba(93,200,214,.5), transparent),\n    radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,.3), transparent);\n  background-size: 800px 800px, 600px 600px, 700px 700px, 500px 500px, 900px 900px, 650px 650px, 750px 750px, 550px 550px;\n  background-repeat: repeat;\n  opacity: .6;\n}\n\n/* Grid floor */\n.world-grid {\n  position: absolute;\n  left: 50%;\n  top: 80%;\n  width: 220vw;\n  height: 140vh;\n  transform: translateX(-50%) rotateX(72deg);\n  transform-origin: 50% 0%;\n  background-image:\n    linear-gradient(rgba(71, 177, 191, 0.18) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(71, 177, 191, 0.18) 1px, transparent 1px);\n  background-size: 64px 64px;\n  mask-image: radial-gradient(ellipse 60% 80% at 50% 0%, #000 0%, transparent 80%);\n  -webkit-mask-image: radial-gradient(ellipse 60% 80% at 50% 0%, #000 0%, transparent 80%);\n  opacity: .55;\n}\n\n/* Glows */\n.world-glow {\n  position: absolute;\n  border-radius: 50%;\n  filter: blur(80px);\n  opacity: .55;\n}\n.world-glow-a {\n  width: 900px; height: 900px;\n  top: -300px; left: 50%;\n  transform: translateX(-50%);\n  background: radial-gradient(circle, rgba(43, 117, 169, .5), transparent 60%);\n}\n.world-glow-b {\n  width: 700px; height: 700px;\n  top: 30%; right: -200px;\n  background: radial-gradient(circle, rgba(71, 177, 191, .25), transparent 60%);\n}\n.world-glow-c {\n  width: 600px; height: 600px;\n  bottom: -200px; left: -150px;\n  background: radial-gradient(circle, rgba(21, 38, 112, .6), transparent 60%);\n}\n\n/* Govern Ring — anchors center, scales/rotates with scroll */\n.govern-ring {\n  position: absolute;\n  left: 50%;\n  top: 50%;\n  width: 720px;\n  height: 720px;\n  transform: translate(-50%, -50%) scale(var(--ring-scale, 1)) rotate(var(--ring-rot, 0deg));\n  transform-origin: center;\n  transition: transform 0.4s cubic-bezier(.22,1,.36,1);\n  filter: drop-shadow(0 0 40px rgba(71, 177, 191, .15));\n}\n.govern-ring-svg {\n  width: 100%; height: 100%;\n  animation: ring-spin 90s linear infinite;\n}\n@keyframes ring-spin {\n  to { transform: rotate(360deg); }\n}\n.ring-sweep {\n  transform-origin: center;\n  animation: ring-sweep 6s linear infinite;\n}\n@keyframes ring-sweep {\n  to { stroke-dashoffset: -1260; }\n}\n\n/* Loop nodes around the ring */\n.loop-orbit {\n  position: absolute;\n  left: 50%; top: 50%;\n  width: 720px; height: 720px;\n  transform: translate(-50%, -50%) scale(var(--ring-scale, 1));\n  transition: transform 0.4s cubic-bezier(.22,1,.36,1);\n}\n.loop-node {\n  position: absolute;\n  left: 50%; top: 50%;\n  width: 0; height: 0;\n  transform: rotate(var(--angle)) translateY(-330px) rotate(calc(-1 * var(--angle)));\n}\n.loop-node-dot {\n  position: absolute;\n  left: 50%; top: 50%;\n  transform: translate(-50%,-50%);\n  width: 14px; height: 14px;\n  border-radius: 50%;\n  background: var(--surf-2);\n  border: 1px solid var(--bdr-2);\n  transition: all .4s ease;\n}\n.loop-node.lit .loop-node-dot {\n  background: var(--senzai-teal);\n  border-color: var(--senzai-teal-bright);\n  box-shadow: 0 0 24px var(--senzai-teal-bright), 0 0 48px rgba(93,200,214,.5);\n  transform: translate(-50%,-50%) scale(1.4);\n}\n.loop-node-label {\n  position: absolute;\n  left: 50%; top: 50%;\n  transform: translate(-50%, 22px);\n  white-space: nowrap;\n  font-family: var(--f-d);\n  font-size: 10px;\n  font-weight: 700;\n  letter-spacing: .14em;\n  text-transform: uppercase;\n  color: var(--text-3);\n  transition: color .4s ease;\n}\n.loop-node.lit .loop-node-label {\n  color: var(--senzai-teal-bright);\n}\n\n/* World core mark */\n.world-core {\n  position: absolute;\n  left: 50%; top: 50%;\n  width: 92px; height: 92px;\n  transform: translate(-50%, -50%) scale(var(--core-scale, 1));\n  transition: transform 0.4s cubic-bezier(.22,1,.36,1);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  filter: drop-shadow(0 0 24px rgba(71,177,191,.4));\n}\n.world-core img {\n  width: 100%; height: 100%;\n  object-fit: contain;\n  opacity: .85;\n}\n\n/* Depth layers — floating ambient chips */\n.depth-layer {\n  position: absolute;\n  inset: 0;\n  pointer-events: none;\n}\n.depth-chip {\n  position: absolute;\n  font-family: var(--f-d);\n  font-size: 10px;\n  font-weight: 600;\n  letter-spacing: .08em;\n  text-transform: uppercase;\n  color: var(--text-3);\n  background: rgba(13, 24, 40, 0.7);\n  border: 1px solid var(--bdr);\n  padding: 5px 12px;\n  border-radius: 100px;\n  backdrop-filter: blur(8px);\n  white-space: nowrap;\n  opacity: .55;\n}\n.depth-chip.lit {\n  color: var(--senzai-teal-bright);\n  border-color: var(--bdr-3);\n  background: rgba(43, 117, 169, 0.15);\n}\n\n.depth-far .depth-chip:nth-child(1) { top: 12%; left: 6%; }\n.depth-far .depth-chip:nth-child(2) { top: 22%; right: 8%; }\n.depth-far .depth-chip:nth-child(3) { top: 65%; left: 4%; }\n.depth-far .depth-chip:nth-child(4) { top: 78%; right: 10%; }\n.depth-far .depth-chip:nth-child(5) { top: 40%; left: 8%; }\n.depth-far .depth-chip:nth-child(6) { top: 50%; right: 6%; }\n.depth-far { transform: translateY(calc(var(--scroll-far, 0) * -50px)); }\n\n.depth-mid .depth-chip:nth-child(1) { top: 30%; right: 14%; }\n.depth-mid .depth-chip:nth-child(2) { top: 70%; left: 12%; }\n.depth-mid .depth-chip:nth-child(3) { top: 18%; left: 14%; }\n.depth-mid .depth-chip:nth-child(4) { top: 82%; right: 16%; }\n.depth-mid { transform: translateY(calc(var(--scroll-mid, 0) * -100px)); }\n\n\n/* ============================================================\n   RESPONSIVE — 1600px+  (large external monitors)\n   ============================================================ */\n@media (min-width: 1600px) {\n  :root {\n    --container: 1320px;\n    --pad: 56px;\n  }\n  .split { gap: 96px; }\n  .stage { padding: 180px var(--pad); }\n  .hero-inner { max-width: 1100px; }\n  .hero-title { font-size: clamp(60px, 5.5vw, 96px); }\n  .hero-sub { font-size: clamp(18px, 1.3vw, 22px); max-width: 700px; }\n  .nav-wordmark { font-size: 20px; }\n  h2 { font-size: clamp(40px, 3.2vw, 64px); }\n  .lede { font-size: clamp(16px, 1.1vw, 20px); }\n}\n\n/* ============================================================\n   RESPONSIVE — 1280px  (standard MacBook / laptop)\n   ============================================================ */\n@media (max-width: 1280px) {\n  :root { --pad: 40px; }\n  .split { gap: 56px; }\n  .stage { padding: 130px var(--pad); }\n  .stage-hero { padding-top: 150px; padding-bottom: 80px; }\n  .stage-cta { padding: 120px var(--pad); }\n}\n\n/* ============================================================\n   RESPONSIVE — 1024px  (small laptop / iPad landscape)\n   ============================================================ */\n@media (max-width: 1024px) {\n  :root { --pad: 32px; }\n  .split {\n    gap: 40px;\n    grid-template-columns: 1fr 1fr;\n  }\n  .stage { padding: 100px var(--pad); }\n  .stage-hero { padding-top: 120px; padding-bottom: 64px; }\n  .stage-cta { padding: 100px var(--pad); }\n\n  /* Scale mockups down slightly so they don\u0027t crowd the copy */\n  .split-art {\n    transform: scale(0.88);\n    transform-origin: center top;\n  }\n\n  /* Tighten type scale for copy columns */\n  h2 { font-size: clamp(26px, 3.2vw, 44px); }\n  .lede { font-size: clamp(14px, 1.2vw, 17px); }\n\n  /* Section heads breathe properly */\n  .section-head { margin-bottom: 48px; }\n  .section-head-center { margin-bottom: 48px; }\n\n  /* Problem cards less padded */\n  .problem-card { padding: 36px 28px; }\n\n  /* Testimonials stay 3-col but tighter */\n  .testi { padding: 24px 22px; }\n  .testi p { font-size: 13px; }\n\n  /* Agent cards */\n  .agent-card { padding: 18px 20px; }\n  .agent-card p { font-size: 12px; }\n}\n\n@media (max-width: 900px) {\n  .depth-layer { display: none; }\n  .govern-ring, .loop-orbit { width: 480px; height: 480px; }\n  .loop-node { transform: rotate(var(--angle)) translateY(-220px) rotate(calc(-1 * var(--angle))); }\n}\n\n/* ============================================================\n   NAV\n   ============================================================ */\n.nav {\n  position: fixed;\n  top: 0; left: 0; right: 0;\n  z-index: 100;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 14px var(--pad);\n  background: rgba(6, 8, 15, 0.7);\n  backdrop-filter: blur(16px);\n  -webkit-backdrop-filter: blur(16px);\n  border-bottom: 1px solid var(--bdr);\n  transition: background .3s ease;\n}\n.nav.scrolled {\n  background: rgba(6, 8, 15, 0.92);\n}\n.nav-brand {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n}\n.nav-mark {\n  width: 40px; height: 40px;\n  object-fit: contain;\n    border-radius: 8px;\n  padding: 4px;\n  box-shadow: 0 2px 12px rgba(71, 177, 191, .25);\n}\n.nav-wordmark {\n  font-family: var(--f-d);\n  font-size: 18px;\n  font-weight: 700;\n  letter-spacing: .14em;\n  color: var(--text);\n}\n.nav-tag {\n  font-family: var(--f-d);\n  font-size: 9px;\n  font-weight: 600;\n  letter-spacing: .2em;\n  text-transform: uppercase;\n  color: var(--senzai-teal);\n  border-left: 1px solid var(--bdr-2);\n  padding-left: 12px;\n  margin-left: 4px;\n}\n.nav-links {\n  display: flex;\n  gap: 28px;\n}\n.nav-links a {\n  font-family: var(--f-d);\n  font-size: 13px;\n  font-weight: 500;\n  color: var(--text-2);\n  transition: color .2s ease;\n}\n.nav-links a:hover { color: var(--senzai-teal-bright); }\n.nav-cta {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  padding: 9px 20px;\n  border-radius: 8px;\n  background: var(--cta);\n  color: #fff !important;\n  font-family: var(--f-d);\n  font-size: 13px;\n  font-weight: 600;\n  transition: all .2s ease;\n}\n.nav-cta:hover {\n  background: var(--cta-h);\n  transform: translateY(-1px);\n  box-shadow: 0 8px 24px rgba(255, 99, 32, .3);\n}\n@media (max-width: 900px) {\n  .nav-tag { display: none; }\n  .nav-links { display: none; }\n}\n\n/* ============================================================\n   STAGES — sections sit above the world\n   ============================================================ */\n.stage {\n  position: relative;\n  z-index: 2;\n  isolation: isolate;\n}\n.stage-loop {\n  min-height: 100vh;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}\n.stage-loop .stage-inner { padding: 0; }\n\n/* veil behind content sections so the loop never fights copy */\n.stage:not(.stage-hero):not(.stage-loop)::before {\n  content: \u0027\u0027;\n  position: absolute;\n  inset: 0;\n  z-index: -1;\n  background:\n    radial-gradient(ellipse 70% 55% at 50% 50%, rgba(8, 11, 28, .72) 0%, rgba(8, 11, 28, .55) 55%, rgba(8, 11, 28, .15) 100%);\n  pointer-events: none;\n}\n.stage { padding: 160px var(--pad); min-height: 100vh; scroll-snap-align: start; }\n.section-head { margin-bottom: 72px; max-width: 680px; }\n.stage-inner {\n  width: 100%;\n  max-width: var(--container);\n  margin: 0 auto;\n}\n.stage-narrow { max-width: 820px; }\n\n.section-head { margin-bottom: 56px; }\n.section-head-center { text-align: center; max-width: 720px; margin: 0 auto 64px; }\n.section-head-center \u003e * { margin-left: auto; margin-right: auto; }\n.section-head-center .lede { max-width: 60ch; margin: 0 auto; }\n\n.eyebrow {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  font-family: var(--f-d);\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: .2em;\n  text-transform: uppercase;\n  color: var(--senzai-teal-bright);\n  margin-bottom: 18px;\n  padding: 4px 14px 4px 10px;\n  border-radius: 100px;\n  background: rgba(43, 117, 169, 0.12);\n  border: 1px solid var(--bdr-2);\n}\n.eyebrow .dot, .hero-eyebrow .dot {\n  width: 6px; height: 6px;\n  border-radius: 50%;\n  background: var(--senzai-teal-bright);\n  box-shadow: 0 0 8px var(--senzai-teal-bright);\n  animation: pulse 2s infinite;\n}\n@keyframes pulse {\n  0%, 100% { opacity: 1; }\n  50% { opacity: .35; }\n}\n\nh1, h2, h3 {\n  font-family: var(--f-d);\n  letter-spacing: -.02em;\n  line-height: 1.05;\n}\nh2 {\n  font-size: clamp(32px, 4vw, 54px);\n  font-weight: 600;\n  margin-bottom: 18px;\n}\nh3 {\n  font-size: clamp(18px, 1.6vw, 22px);\n  font-weight: 600;\n  margin-bottom: 10px;\n}\n.lede {\n  font-size: clamp(15px, 1.3vw, 18px);\n  color: var(--text-2);\n  line-height: 1.7;\n  max-width: 60ch;\n}\n.grad {\n  background: var(--senzai-gradient-text);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n}\n\n/* ============================================================\n   HERO\n   ============================================================ */\n.stage-hero {\n  padding-top: 160px;\n  padding-bottom: 80px;\n  min-height: 100vh;\n  display: flex;\n  align-items: center;\n}\n.hero-inner {\n  text-align: center;\n  max-width: 920px;\n  margin: 0 auto;\n  position: relative;\n}\n.hero-eyebrow {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  padding: 6px 18px 6px 14px;\n  border-radius: 100px;\n  background: rgba(43, 117, 169, 0.12);\n  border: 1px solid var(--bdr-2);\n  font-family: var(--f-d);\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: .15em;\n  text-transform: uppercase;\n  color: var(--senzai-teal-bright);\n  margin-bottom: 28px;\n}\n.hero-title {\n  font-size: clamp(40px, 6.5vw, 88px);\n  font-weight: 600;\n  line-height: 1.04;\n  letter-spacing: -.035em;\n  margin-bottom: 28px;\n}\n.hero-sub {\n  font-size: clamp(16px, 1.5vw, 19px);\n  color: var(--text-2);\n  line-height: 1.7;\n  max-width: 580px;\n  margin: 0 auto 40px;\n}\n.hero-ctas {\n  display: flex;\n  gap: 14px;\n  justify-content: center;\n  flex-wrap: wrap;\n  margin-bottom: 48px;\n}\n.btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  padding: 14px 28px;\n  border-radius: 10px;\n  font-family: var(--f-d);\n  font-size: 15px;\n  font-weight: 600;\n  cursor: pointer;\n  border: 1px solid transparent;\n  transition: all .2s ease;\n}\n.btn-primary {\n  background: var(--cta);\n  color: #fff;\n}\n.btn-primary:hover {\n  background: var(--cta-h);\n  transform: translateY(-2px);\n  box-shadow: 0 10px 32px rgba(255, 99, 32, .35);\n}\n.btn-ghost {\n  background: rgba(13, 24, 40, 0.5);\n  color: var(--text);\n  border-color: var(--bdr-2);\n  backdrop-filter: blur(8px);\n}\n.btn-ghost:hover {\n  border-color: var(--bdr-3);\n  background: rgba(43, 117, 169, 0.15);\n}\n\n.hero-tags {\n  display: flex;\n  flex-wrap: wrap;\n  justify-content: center;\n  gap: 10px;\n  margin-bottom: 64px;\n}\n.hero-tags span {\n  padding: 6px 16px;\n  border-radius: 100px;\n  border: 1px solid var(--bdr);\n  font-family: var(--f-d);\n  font-size: 11px;\n  font-weight: 500;\n  letter-spacing: .04em;\n  color: var(--text-2);\n  background: rgba(13, 24, 40, 0.4);\n  backdrop-filter: blur(8px);\n}\n\n.hero-scroll-cue {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 8px;\n  font-family: var(--f-d);\n  font-size: 10px;\n  font-weight: 600;\n  letter-spacing: .25em;\n  text-transform: uppercase;\n  color: var(--text-3);\n  animation: float 2.4s ease-in-out infinite;\n}\n.hero-scroll-cue i {\n  display: block;\n  width: 1px;\n  height: 36px;\n  background: linear-gradient(to bottom, var(--senzai-teal), transparent);\n}\n@keyframes float {\n  0%, 100% { transform: translateY(0); opacity: .7; }\n  50% { transform: translateY(8px); opacity: 1; }\n}\n\n/* ============================================================\n   PROBLEM\n   ============================================================ */\n.problem-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 0;\n  border: 1px solid var(--bdr);\n  background: rgba(13, 24, 40, 0.5);\n  backdrop-filter: blur(8px);\n  border-radius: 16px;\n  overflow: hidden;\n}\n.problem-card {\n  padding: 48px 36px;\n  border-right: 1px solid var(--bdr);\n  position: relative;\n  transition: background .3s ease;\n}\n.problem-card:last-child { border-right: none; }\n.problem-card:hover { background: rgba(43, 117, 169, 0.06); }\n.problem-num {\n edia (max-width: 900px) {\n  .nav-mob-toggle { display: flex; }\n  .nav-mob-open .nav-links {\n    display: flex !important;\n    flex-direction: column;\n    position: fixed;\n    top: 65px; left: 0; right: 0;\n    background: rgba(6, 8, 15, 0.97);\n    backdrop-filter: blur(20px);\n    -webkit-backdrop-filter: blur(20px);\n    padding: 20px var(--pad) 28px;\n    border-bottom: 1px solid var(--bdr);\n    gap: 0;\n    z-index: 99;\n  }\n  .nav-mob-open .nav-links a {\n    font-size: 15px;\n    padding: 14px 0;\n    border-bottom: 1px solid var(--bdr);\n    color: var(--text-2);\n  }\n  .nav-mob-open .nav-links a:last-child { border-bottom: none; }\n}\n\n/* ============================================================\n   RESPONSIVE — 768px  (tablet portrait)\n   ============================================================ */\n@media (max-width: 768px) {\n  :root { --pad: 20px; }\n  .stage { padding: 100px var(--pad); }\n  .stage-hero { padding-top: 100px; padding-bottom: 56px; }\n  .stage-cta { padding: 80px var(--pad); }\n  .govern-ring, .loop-orbit { width: 380px; height: 380px; }\n  .loop-node {\n    transform: rotate(var(--angle)) translateY(-174px) rotate(calc(-1 * var(--angle)));\n  }\n  .testi-grid { grid-template-columns: 1fr 1fr; }\n    .split-art { transform: scale(0.9); transform-origin: center top; }\n  .problem-card { padding: 30px 24px; }\n}\n\n/* ============================================================\n   RESPONSIVE — 480px  (mobile phones)\n   ============================================================ */\n@media (max-width: 480px) {\n  :root { --pad: 16px; }\n  .stage { padding: 72px var(--pad); }\n  .stage-hero { padding-top: 88px; padding-bottom: 40px; min-height: 100svh; }\n  .stage-cta { padding: 56px var(--pad); }\n\n  h2 { font-size: clamp(26px, 7.5vw, 40px); }\n  .hero-title { font-size: clamp(30px, 9vw, 52px); }\n  .hero-sub { font-size: 15px; }\n  .hero-ctas { flex-direction: column; align-items: center; }\n  .hero-ctas .btn { width: 100%; justify-content: center; }\n  .hero-tags { gap: 8px; }\n\n  .govern-ring, .loop-orbit { width: 240px; height: 240px; }\n  .loop-node {\n    transform: rotate(var(--angle)) translateY(-108px) rotate(calc(-1 * var(--angle)));\n  }\n  .loop-node-label { font-size: 8px; }\n  .world-core { width: 52px; height: 52px; }\n\n  .bullets li {\n    display: block;\n    padding-left: 22px;\n    position: relative;\n  }\n  .bullets li::before {\n    position: absolute;\n    left: 0;\n    top: 8px;\n    margin: 0;\n  }\n  .bullets li strong { display: block; margin-bottom: 2px; }\n\n  .tilt { transform: perspective(1200px) rotateY(-3deg) rotateX(2deg); }\n  .tilt-flip { transform: perspective(1200px) rotateY(3deg) rotateX(2deg); }\n  .tilt:hover, .tilt-flip:hover { transform: translateY(-2px); }\n\n  .testi-grid { grid-template-columns: 1fr; }\n  .testi { padding: 24px 20px; }\n\n  .agents { grid-template-columns: 1fr; }\n\n  .foot-inner { flex-direction: column; align-items: flex-start; gap: 16px; }\n  .foot-links { flex-wrap: wrap; gap: 14px; }\n\n\n  .nav-cta { padding: 8px 14px; font-size: 12px; }\n\n\n  /* Single-screen sections on mobile */\n  .split-art { display: none; }\n  .stage { padding: 52px var(--pad); }\n  .stage-hero { padding-top: 88px; }\n  .section-head, .section-head-center { margin-bottom: 28px; }\n\n  /* Compact problem cards */\n  .problem-card { padding: 24px 20px; }\n  .problem-num { font-size: 40px; margin-bottom: 10px; }\n\n  /* Compact agents */\n  .agent-card { padding: 18px; }\n\n  /* Stage-loop ring area compact */\n  .stage-loop { min-height: 100svh; }\n}\n/* Ring-fit patch: exact hero arrangement */\n.stage-hero {\n  padding-top: clamp(86px, 8vw, 112px);\n  padding-bottom: clamp(20px, 3.2vw, 36px);\n  min-height: 100svh;\n}\n\n.stage-hero .hero-inner {\n  max-width: min(82vw, 680px);\n}\n\n.stage-hero .hero-eyebrow { margin-bottom: 14px; }\n\n.stage-hero .hero-title {\n  max-width: 11ch;\n  margin: 0 auto 12px;\n  font-size: clamp(2.6rem, 5.2vw, 5rem);\n  line-height: 1.03;\n  letter-spacing: -0.03em;\n}\n\n.stage-hero .hero-sub {\n  max-width: min(40ch, 72vw);\n  margin: 0 auto 16px;\n  line-height: 1.36;\n  font-size: clamp(1rem, 1.5vw, 2rem);\n}\n\n.stage-hero .hero-ctas {\n  margin-bottom: 12px;\n  gap: 0.5rem;\n}\n\n.stage-hero .hero-tags {\n  justify-content: center;\n  gap: 0.45rem;\n  margin-bottom: 8px;\n}\n\n.stage-hero .hero-tags span {\n  padding: 6px 12px;\n  font-size: 10px;\n}\n\n@media (max-width: 768px) {\n  .stage-hero {\n    padding-top: 78px;\n    padding-bottom: 20px;\n  }\n  .stage-hero .hero-inner { max-width: min(92vw, 560px); }\n  .stage-hero .hero-title {\n    max-width: 10.6ch;\n    font-size: clamp(2.05rem, 8.2vw, 3.6rem);\n    line-height: 1.04;\n  }\n  .stage-hero .hero-sub {\n    max-width: min(36ch, 86vw);\n    margin-bottom: 12px;\n    font-size: 15px;\n  }\n  .stage-hero .hero-ctas { margin-bottom: 10px; }\n  .stage-hero .hero-tags {\n    gap: 0.38rem;\n    margin-bottom: 6px;\n  }\n  .stage-hero .hero-tags span {\n    padding: 5px 10px;\n    font-size: 9px;\n  }\n}\n\n\n/* Responsive patch: mobile-first hardening */\nhtml, body { max-width: 100%; overflow-x: clip; }\n* { box-sizing: border-box; }\nimg, video, svg, canvas, iframe { max-width: 100%; height: auto; }\n\n.stage-inner, .foot-inner, .nav {\n  width: min(100% - 2rem, var(--container));\n}\n\n.hero-inner, .hero-sub {\n  max-width: 100%;\n}\n\n.hero-ctas {\n  flex-wrap: wrap;\n  gap: 0.75rem;\n}\n\n.btn, button, input, select, textarea {\n  max-width: 100%;\n}\n\ninput, select, textarea, button, .btn, .nav-cta {\n  min-height: 44px;\n}\n\n.problem-grid,\n.split,\n.radar-wrap,\n.pf-board,\n.agents,\n.mk-grid,\n.testi-grid,\n.af-back-grid {\n  min-width: 0;\n}\n\n.pf-board,\n.mk-grid,\n.testi-grid,\n.agents {\n  grid-template-columns: 1fr;\n}\n\ntable {\n  display: block;\n  width: 100%;\n  overflow-x: auto;\n  -webkit-overflow-scrolling: touch;\n}\n\n@media (min-width: 425px) {\n  .pf-board,\n  .mk-grid,\n  .testi-grid,\n  .agents {\n    grid-template-columns: repeat(2, minmax(0, 1fr));\n  }\n}\n\n@media (max-width: 768px) {\n  .nav {\n    width: calc(100% - 1rem);\n  }\n\n  .nav-mob-open .nav-links {\n    max-width: calc(100vw - 1rem);\n    left: 0.5rem;\n    right: 0.5rem;\n  }\n\n  .hero-title {\n    word-break: break-word;\n  }\n\n  .split-art,\n  .tilt,\n  .tilt-flip {\n    max-width: 100%;\n    transform-origin: center top;\n  }\n}\n\n@media (min-width: 768px) {\n  .mk-grid,\n  .testi-grid,\n  .agents {\n    grid-template-columns: repeat(2, minmax(0, 1fr));\n  }\n}\n\n@media (min-width: 1024px) {\n  .mk-grid,\n  .testi-grid,\n  .agents {\n    grid-template-columns: repeat(3, minmax(0, 1fr));\n  }\n\n  .pf-board {\n    grid-template-columns: repeat(5, minmax(0, 1fr));\n  }\n}\n\n@media (min-width: 1440px) {\n  .stage-inner, .foot-inner, .nav {\n    width: min(100% - 4rem, var(--container));\n  }\n}\n\u003c/style\u003e\n\n\n\u003c/head\u003e\n\u003cbody\u003e\n\n\u003c!-- ============================================================\n     PERSISTENT 3D SCENE — fixed behind everything, scroll-linked.\n     Built from layered HTML/SVG/CSS-3D, not WebGL.\n     ============================================================ --\u003e\n\u003cdiv class=\"world\" aria-hidden=\"true\"\u003e\n\n  \u003c!-- Deep starfield + grid floor --\u003e\n  \u003cdiv class=\"world-bg\"\u003e\n    \u003cdiv class=\"world-stars\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"world-grid\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"world-glow world-glow-a\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"world-glow world-glow-b\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"world-glow world-glow-c\"\u003e\u003c/div\u003e\n  \u003c/div\u003e\n\n  \u003c!-- The Govern Ring — persistent, the spine of the scene --\u003e\n  \u003cdiv class=\"govern-ring\" data-stage=\"\"\u003e\n    \u003csvg viewBox=\"-220 -220 440 440\" class=\"govern-ring-svg\"\u003e\n      \u003cdefs\u003e\n        \u003clinearGradient id=\"ringGrad\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"\u003e\n          \u003cstop offset=\"0%\" stop-color=\"#47B1BF\"\u003e\u003c/stop\u003e\n          \u003cstop offset=\"50%\" stop-color=\"#2B75A9\"\u003e\u003c/stop\u003e\n          \u003cstop offset=\"100%\" stop-color=\"#152670\"\u003e\u003c/stop\u003e\n        \u003c/linearGradient\u003e\n        \u003clinearGradient id=\"ringGrad2\" x1=\"1\" y1=\"0\" x2=\"0\" y2=\"1\"\u003e\n          \u003cstop offset=\"0%\" stop-color=\"#5DC8D6\" stop-opacity=\".0\"\u003e\u003c/stop\u003e\n          \u003cstop offset=\"50%\" stop-color=\"#5DC8D6\" stop-opacity=\".8\"\u003e\u003c/stop\u003e\n          \u003cstop offset=\"100%\" stop-color=\"#5DC8D6\" stop-opacity=\".0\"\u003e\u003c/stop\u003e\n        \u003c/linearGradient\u003e\n      \u003c/defs\u003e\n      \u003ccircle r=\"200\" fill=\"none\" stroke=\"url(#ringGrad)\" stroke-width=\"1\" opacity=\".55\"\u003e\u003c/circle\u003e\n      \u003ccircle r=\"170\" fill=\"none\" stroke=\"rgba(71,177,191,.18)\" stroke-width=\"1\" stroke-dasharray=\"2 6\"\u003e\u003c/circle\u003e\n      \u003ccircle r=\"140\" fill=\"none\" stroke=\"rgba(71,177,191,.12)\" stroke-width=\"1\"\u003e\u003c/circle\u003e\n      \u003c!-- Tick marks around ring --\u003e\n      \u003cg class=\"ring-ticks\" stroke=\"rgba(71,177,191,.55)\" stroke-width=\"1\"\u003e\n        \u003c!-- generated dynamically below --\u003e\n      \u003c/g\u003e\n      \u003c!-- Govern label badges anchored to the ring --\u003e\n      \u003cg class=\"ring-badges\" font-family=\"\u0027Space Grotesk\u0027, sans-serif\" font-size=\"7\" font-weight=\"700\" letter-spacing=\"1.2\" fill=\"rgba(93,200,214,.85)\"\u003e\n        \u003ctext x=\"0\" y=\"-208\" text-anchor=\"middle\"\u003eGOVERN\u003c/text\u003e\n        \u003ctext x=\"208\" y=\"2\" text-anchor=\"middle\" transform=\"rotate(90 208 2)\"\u003eAUDIT\u003c/text\u003e\n        \u003ctext x=\"0\" y=\"216\" text-anchor=\"middle\"\u003ePOLICY\u003c/text\u003e\n        \u003ctext x=\"-208\" y=\"2\" text-anchor=\"middle\" transform=\"rotate(-90 -208 2)\"\u003eAPPROVE\u003c/text\u003e\n      \u003c/g\u003e\n      \u003c!-- Sweeping pulse arc --\u003e\n      \u003ccircle r=\"200\" fill=\"none\" stroke=\"url(#ringGrad2)\" stroke-width=\"2\" stroke-dasharray=\"60 1200\" class=\"ring-sweep\"\u003e\u003c/circle\u003e\n    \u003c/svg\u003e\n  \u003c/div\u003e\n\n  \u003c!-- The Loop — 5 stage nodes positioned around the ring --\u003e\n  \u003cdiv class=\"loop-orbit\" data-stage=\"\"\u003e\n    \u003cdiv class=\"loop-node\" style=\"--angle:-90deg;\" data-node=\"decide\"\u003e\n      \u003cdiv class=\"loop-node-dot\"\u003e\u003c/div\u003e\n      \u003cdiv class=\"loop-node-label\"\u003e01 · Decide\u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"loop-node\" style=\"--angle:-18deg;\" data-node=\"design\"\u003e\n      \u003cdiv class=\"loop-node-dot\"\u003e\u003c/div\u003e\n      \u003cdiv class=\"loop-node-label\"\u003e02 · Design\u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"loop-node\" style=\"--angle:54deg;\" data-node=\"accelerate\"\u003e\n      \u003cdiv class=\"loop-node-dot\"\u003e\u003c/div\u003e\n      \u003cdiv class=\"loop-node-label\"\u003e03 · Accelerate\u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"loop-node\" style=\"--angle:126deg;\" data-node=\"govern\"\u003e\n      \u003cdiv class=\"loop-node-dot\"\u003e\u003c/div\u003e\n      \u003cdiv class=\"loop-node-label\"\u003e04 · Govern\u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"loop-node\" style=\"--angle:198deg;\" data-node=\"reuse\"\u003e\n      \u003cdiv class=\"loop-node-dot\"\u003e\u003c/div\u003e\n      \u003cdiv class=\"loop-node-label\"\u003e05 · Reuse\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\n  \u003c!-- Senzai mark at the core of the world --\u003e\n  \u003cdiv class=\"world-core\" data-stage=\"\"\u003e\n    \u003cimg src=\"54570bce-34aa-4641-a1af-b590ffb16f3d\" alt=\"\"\u003e\n  \u003c/div\u003e\n\n  \u003c!-- Layered floating depth chips — the \"ambient enterprise data\" --\u003e\n  \u003cdiv class=\"depth-layer depth-far\"\u003e\n    \u003cspan class=\"depth-chip\"\u003eStage gate · Blueprint #14\u003c/span\u003e\n    \u003cspan class=\"depth-chip\"\u003eCVE scan complete\u003c/span\u003e\n    \u003cspan class=\"depth-chip\"\u003eSenzScore 82\u003c/span\u003e\n    \u003cspan class=\"depth-chip\"\u003ePHI masking · enforced\u003c/span\u003e\n    \u003cspan class=\"depth-chip\"\u003eOwner assigned\u003c/span\u003e\n    \u003cspan class=\"depth-chip\"\u003eAudit trace linked\u003c/span\u003e\n  \u003c/div\u003e\n  \u003cdiv class=\"depth-layer depth-mid\"\u003e\n    \u003cspan class=\"depth-chip lit\"\u003eReuse match found\u003c/span\u003e\n    \u003cspan class=\"depth-chip\"\u003eHIPAA · HITRUST\u003c/span\u003e\n    \u003cspan class=\"depth-chip\"\u003eSprint 2 of 3\u003c/span\u003e\n    \u003cspan class=\"depth-chip\"\u003e142 tests passing\u003c/span\u003e\n  \u003c/div\u003e\n\u003c/div\u003e\n\n\n\u003c!-- ============================================================\n     NAV\n     ============================================================ --\u003e\n\u003cheader class=\"nav\" data-nav=\"\"\u003e\n  \u003ca class=\"nav-brand\" href=\"#top\" aria-label=\"SENZAI\"\u003e\n    \u003cimg src=\"https://plain-apac-prod-public.komododecks.com/202605/12/qWAW0EuJlxU8UFzVKH8V/image.jpg\" alt=\"SENZAI\" class=\"nav-mark\"\u003e\n    \u003cspan class=\"nav-wordmark\"\u003eSENZAI\u003c/span\u003e\n    \u003cspan class=\"nav-tag\"\u003eEnterprise AI OS\u003c/span\u003e\n  \u003c/a\u003e\n  \u003cnav class=\"nav-links\" aria-label=\"Primary\"\u003e\n    \u003ca href=\"#problem\"\u003eWhy Senzai\u003c/a\u003e\n    \u003ca href=\"#decide\"\u003eDecide\u003c/a\u003e\n    \u003ca href=\"#design\"\u003eDesign\u003c/a\u003e\n    \u003ca href=\"#accelerate\"\u003eAccelerate\u003c/a\u003e\n    \u003ca href=\"#govern\"\u003eGovern\u003c/a\u003e\n    \u003ca href=\"#reuse\"\u003eReuse\u003c/a\u003e\n  \u003c/nav\u003e\n  \u003cbutton class=\"nav-mob-toggle\" aria-label=\"Toggle menu\" aria-expanded=\"false\"\u003e\u003cspan\u003e\u003c/span\u003e\u003cspan\u003e\u003c/span\u003e\u003cspan\u003e\u003c/span\u003e\u003c/button\u003e\n  \u003ca class=\"nav-cta\" href=\"#cta\"\u003eRequest Demo\u003cspan aria-hidden=\"true\"\u003e→\u003c/span\u003e\u003c/a\u003e\n\u003c/header\u003e\n\n\n\u003c!-- ============================================================\n     SECTIONS — scroll the page, the world reacts.\n     Each section is a \"stage\" the camera moves to.\n     ============================================================ --\u003e\n\u003cmain id=\"top\"\u003e\n\n  \u003c!-- HERO --\u003e\n  \u003csection class=\"stage stage-hero\" data-stage-id=\"hero\" id=\"hero\"\u003e\n    \u003cdiv class=\"stage-inner hero-inner\"\u003e\n      \u003cdiv class=\"hero-eyebrow\"\u003e\n        \u003cspan class=\"dot\"\u003e\u003c/span\u003e\n        Infinite\u0027s Enterprise AI Delivery Operating System\n      \u003c/div\u003e\n      \u003ch1 class=\"hero-title\"\u003e\n     AI, Designed for\u003cbr\u003e\n        Decisions.\u003cbr\u003e\n        \u003cspan class=\"grad\"\u003eBuilt to Deliver.\u003c/span\u003e\n      \u003c/h1\u003e\n      \u003cp class=\"hero-sub\"\u003e\n        From raw idea to governed AI outcome — one continuous loop.\n        Scored. Blueprinted. Built. Governed. Every output a reusable asset.\n      \u003c/p\u003e\n      \u003cdiv class=\"hero-ctas\"\u003e\n        \u003ca class=\"btn btn-primary\" href=\"#problem\"\u003eExplore the Platform\u003cspan aria-hidden=\"true\"\u003e→\u003c/span\u003e\u003c/a\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"hero-tags\"\u003e\n        \u003cspan\u003eGovernance by Design\u003c/span\u003e\n        \u003cspan\u003eDecision-to-Build in Minutes\u003c/span\u003e\n        \u003cspan\u003eEnterprise AI System of Record\u003c/span\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"hero-scroll-cue\"\u003e\n        \u003cspan\u003eScroll\u003c/span\u003e\n        \u003ci\u003e\u003c/i\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n\n  \u003c!-- PROBLEM --\u003e\n  \u003csection class=\"stage stage-problem\" data-stage-id=\"problem\" id=\"problem\"\u003e\n    \u003cdiv class=\"stage-inner\"\u003e\n      \u003cdiv class=\"section-head\"\u003e\n        \u003cdiv class=\"eyebrow\"\u003eWhy Senzai\u003c/div\u003e\n        \u003ch2\u003eEnterprise AI deserves\u003cbr\u003ean operating system of its own.\u003c/h2\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"problem-grid\"\u003e\n        \u003carticle class=\"problem-card\" style=\"--i:0;\"\u003e\n          \u003cdiv class=\"problem-num\"\u003e01\u003c/div\u003e\n          \u003ch3\u003eNo single source of truth\u003c/h3\u003e\n          \u003cp\u003eWithout a governed Blueprint, every team interprets intent differently. Context drifts across runs, tools, and people — outputs diverge from what the business actually needed.\u003c/p\u003e\n        \u003c/article\u003e\n        \u003carticle class=\"problem-card\" style=\"--i:1;\"\u003e\n          \u003cdiv class=\"problem-num\"\u003e02\u003c/div\u003e\n          \u003ch3\u003eGeneric context, generic output\u003c/h3\u003e\n          \u003cp\u003eAI without domain knowledge — industry patterns, client constraints, compliance rules — produces generic results. Precision requires context baked in from the start, not patched on later.\u003c/p\u003e\n        \u003c/article\u003e\n        \u003carticle class=\"problem-card\" style=\"--i:2;\"\u003e\n          \u003cdiv class=\"problem-num\"\u003e03\u003c/div\u003e\n          \u003ch3\u003eSpeed without governance\u003c/h3\u003e\n          \u003cp\u003eUngoverned AI velocity creates security gaps, audit failures, and technical debt that compounds faster than the code itself. Faster is only better when it\u0027s also governed.\u003c/p\u003e\n        \u003c/article\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n\n  \u003c!-- LOOP REVEAL --\u003e\n  \u003csection class=\"stage stage-loop\" data-stage-id=\"loop\" id=\"loop\"\u003e\n    \u003cdiv class=\"stage-inner stage-narrow\" style=\"margin: 0px; padding: 0px 50px\"\u003e\n      \u003cdiv class=\"section-head section-head-center\" style=\"text-align: center; margin: 0px 0px 64px\"\u003e\n        \u003cdiv class=\"eyebrow\" style=\"justify-content: center\"\u003eThe SENZAI Loop\u003c/div\u003e\n        \u003ch2\u003eOne continuous operating loop\u003cbr\u003efrom demand to delivery.\u003c/h2\u003e\n        \u003cp class=\"lede\" style=\"margin-left: auto; margin-right: auto; text-align: center;\"\u003e\n          SENZAI centralizes intake, portfolio governance, blueprinting, factory execution, and reusable AI assets in one controlled system. Five stages. One ring of governance around all of them.\n        \u003c/p\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n\n  \u003c!-- DECIDE --\u003e\n  \u003csection class=\"stage stage-decide\" data-stage-id=\"decide\" id=\"decide\"\u003e\n    \u003cdiv class=\"stage-inner split\"\u003e\n      \u003cdiv class=\"split-copy\"\u003e\n        \u003cdiv class=\"eyebrow\"\u003e01 · Decide\u003c/div\u003e\n        \u003ch2\u003eScore every idea.\u003cbr\u003eBuild only the right ones.\u003c/h2\u003e\n        \u003cp class=\"lede\"\u003e\n          Opportunity Radar surfaces and scores AI initiatives across value, feasibility, readiness, and compliance. Every idea is routed — Build, Validate, Explore, or Defer — before a single sprint is planned.\n        \u003c/p\u003e\n        \u003cul class=\"bullets\"\u003e\n          \u003cli\u003e\n            \u003cstrong\u003eMulti-dimension scoring at intake.\u003c/strong\u003e\n            Value · Feasibility · Readiness · Compliance — a clear signal before any commitment.\n          \u003c/li\u003e\n          \u003cli\u003e\n            \u003cstrong\u003eVisual opportunity landscape.\u003c/strong\u003e\n            Interactive radar heatmap. Spot patterns, verticals, and priorities your leadership can act on.\n          \u003c/li\u003e\n          \u003cli\u003e\n            \u003cstrong\u003eRouted into Portfolio Pipeline.\u003c/strong\u003e\n            Promoted ideas flow directly into the governed pipeline — Idea → Validating → Blueprinted → In Factory → Live.\n          \u003c/li\u003e\n        \u003c/ul\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"split-art\"\u003e\n        \u003cdiv class=\"screen tilt\"\u003e\n          \u003cdiv class=\"screen-bar\"\u003e\n            \u003cspan class=\"dot dot-r\"\u003e\u003c/span\u003e\u003cspan class=\"dot dot-y\"\u003e\u003c/span\u003e\u003cspan class=\"dot dot-g\"\u003e\u003c/span\u003e\n            \u003cspan class=\"screen-title\"\u003eAI Opportunity Radar\u003c/span\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"screen-body screen-body-light\"\u003e\n            \u003cdiv class=\"radar-head\"\u003e\n              \u003cdiv\u003e\n                \u003cdiv class=\"radar-eye\"\u003eOpportunity Intelligence\u003c/div\u003e\n                \u003cdiv class=\"radar-title\"\u003eAI Opportunity Radar\u003c/div\u003e\n                \u003cdiv class=\"radar-sub\"\u003eExplore AI opportunities. Click any point to see details.\u003c/div\u003e\n              \u003c/div\u003e\n              \u003cbutton class=\"radar-cta\" style=\"background-color: rgb(246, 249, 252)\"\u003e\n\u003c/button\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"radar-filters\"\u003e\n              \u003cspan class=\"radar-fl\"\u003eFilter:\u003c/span\u003e\n              \u003cspan class=\"radar-chip\"\u003eAll Verticals ▾\u003c/span\u003e\n              \u003cspan class=\"radar-chip\"\u003eAll Stages ▾\u003c/span\u003e\n              \u003cspan class=\"radar-chip radar-chip-count\"\u003e20 opportunities\u003c/span\u003e\n            \u003c/div\u003e\n e governance gates.\u003c/strong\u003e\n            Blueprint only enters Factory after passing structured approval. No unapproved build ever runs.\n          \u003c/li\u003e\n          \u003cli\u003e\n            \u003cstrong\u003eNew Build and Modernize modes.\u003c/strong\u003e\n            Same governed Blueprint process — different starting points. Greenfield or existing system transformation.\n          \u003c/li\u003e\n        \u003c/ul\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"split-art\"\u003e\n        \u003cdiv class=\"screen tilt tilt-flip\"\u003e\n          \u003cdiv class=\"screen-bar\"\u003e\n            \u003cspan class=\"dot dot-r\"\u003e\u003c/span\u003e\u003cspan class=\"dot dot-y\"\u003e\u003c/span\u003e\u003cspan class=\"dot dot-g\"\u003e\u003c/span\u003e\n            \u003cspan class=\"screen-title\"\u003eBlueprint Studio\u003c/span\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"screen-body screen-body-light\"\u003e\n            \u003cdiv class=\"bp-steps\"\u003e\n              \u003cdiv class=\"bp-step\"\u003e\u003cdiv class=\"bp-step-n done\"\u003e✓\u003c/div\u003e\u003cdiv class=\"bp-step-l\"\u003eIntake\u003c/div\u003e\u003c/div\u003e\n              \u003cdiv class=\"bp-step\"\u003e\u003cdiv class=\"bp-step-n done\"\u003e✓\u003c/div\u003e\u003cdiv class=\"bp-step-l\"\u003eGenerating\u003c/div\u003e\u003c/div\u003e\n              \u003cdiv class=\"bp-step\"\u003e\u003cdiv class=\"bp-step-n act\"\u003e3\u003c/div\u003e\u003cdiv class=\"bp-step-l\"\u003eBlueprint\u003c/div\u003e\u003c/div\u003e\n              \u003cdiv class=\"bp-step\"\u003e\u003cdiv class=\"bp-step-n wait\"\u003e4\u003c/div\u003e\u003cdiv class=\"bp-step-l\"\u003eGovernance\u003c/div\u003e\u003c/div\u003e\n              \u003cdiv class=\"bp-step\"\u003e\u003cdiv class=\"bp-step-n wait\"\u003e5\u003c/div\u003e\u003cdiv class=\"bp-step-l\"\u003eExport\u003c/div\u003e\u003c/div\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"bp-row 003e\n        \u003ch2\u003eEvery output becomes\u003cbr\u003ea reusable asset.\u003c/h2\u003e\n        \u003cp class=\"lede\"\u003e\n          Every POC the Factory produces, every agent that runs — lands in the Marketplace. The next team starts from a proven foundation. The more SENZAI delivers, the faster every future delivery becomes.\n        \u003c/p\u003e\n        \u003cul class=\"bullets\"\u003e\n          \u003cli\u003e\n            \u003cstrong\u003eReuse scan before every Blueprint.\u003c/strong\u003e\n            SENZAI checks Marketplace before generating anything new. Reuse first. Build second. Always.\n          \u003c/li\u003e\n          \u003cli\u003e\n            \u003cstrong\u003eAgents, POCs, tools, and patterns.\u003c/strong\u003e\n            Senz agents available standalone. Completed POCs as accelerators. Governed connectors your teams can trust out of the box.\n          \u003c/li\u003e\n          \u003cli\u003e\n            \u003cstrong\u003eContinuously enriched by every delivery.\u003c/strong\u003e\n            Each Factory run adds to Marketplace. The enterprise AI flywheel compounds with every initiative.\n          \u003c/li\u003e\n        \u003c/ul\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"split-art\"\u003e\n        \u003cdiv class=\"screen tilt\"\u003e\n          \u003cdiv class=\"screen-bar\"\u003e\n            \u003cspan class=\"dot dot-r\"\u003e\u003c/span\u003e\u003cspan class=\"dot dot-y\"\u003e\u003c/span\u003e\u003cspan class=\"dot dot-g\"\u003e\u003c/span\u003e\n            \u003cspan class=\"screen-title\"\u003eMarketplace\u003c/span\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"screen-body screen-body-light\"\u003e\n            \u003cdiv class=\"mk-banner\"\u003e↩ 2 Marketplace matches found for current Blueprint\u003c/div\u003e\n            \u003cdiv class=\"mk-grid\"\u003e\n              \u003cdiv class=\"mk-card\"\u003e\u003cdiv class=\"mk-cat\"\u003ePOC\u003c/div\u003e\u003cdiv class=\"mk-name\"\u003eClaims Adjudication Agent\u003c/div\u003e\u003cspan class=\"mk-tag tag-em\"\u003eProduction\u003c/span\u003e\u003c/div\u003e\n              \u003cdiv class=\"mk-card\"\u003e\u003cdiv class=\"mk-cat\"\u003eAgent\u003c/div\u003e\u003cdiv class=\"mk-name\"\u003eDevSenz\u003c/div\u003e\u003cspan class=\"mk-tag tag-in\"\u003eStandalone\u003c/span\u003e\u003c/div\u003e\n              \u003cdiv class=\"mk-card\"\u003e\u003cdiv class=\"mk-cat\"\u003eTool\u003c/div\u003e\u003cdiv class=\"mk-name\"\u003eAI Readiness Assessment\u003c/div\u003e\u003cspan class=\"mk-tag tag-em\"\u003eProduction\u003c/span\u003e\u003c/div\u003e\n              \u003cdiv class=\"mk-card\"\u003e\u003cdiv class=\"mk-cat\"\u003ePattern\u003c/div\u003e\u003cdiv class=\"mk-name\"\u003eHIPAA Connector Template\u003c/div\u003e\u003cspan class=\"mk-tag tag-em\"\u003eGoverned\u003c/span\u003e\u003c/div\u003e\n              \u003cdiv class=\"mk-card\"\u003e\u003cdiv class=\"mk-cat\"\u003eTool\u003c/div\u003e\u003cdiv class=\"mk-name\"\u003eROI Calculator\u003c/div\u003e\u003cspan class=\"mk-tag tag-em\"\u003eProduction\u003c/span\u003e\u003c/div\u003e\n              \u003cdiv class=\"mk-card\"\u003e\u003cdiv class=\"mk-cat\"\u003eAgent\u003c/div\u003e\u003cdiv class=\"mk-name\"\u003eSecureSenz\u003c/div\u003e\u003cspan class=\"mk-tag tag-in\"\u003eStandalone\u003c/span\u003e\u003c/div\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"mk-foot\" data-placeholder=\"\"\u003e38 assets · enriched by every Factory delivery\u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n\n  \u003c!-- TESTIMONIALS — placeholder, marked --\u003e\n  \u003csection class=\"stage stage-testimonials\" data-stage-id=\"testimonials\" id=\"testimonials\"\u003e\n    \u003cdiv class=\"stage-inner\"\u003e\n      \u003cdiv class=\"section-head section-head-center\"\u003e\n        \u003cdiv class=\"eyebrow\"\u003eFrom our clients\u003c/div\u003e\n        \u003ch2\u003eThe first AI delivery system\u003cbr\u003ebuilt for governance from day one.\u003c/h2\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"testi-grid\"\u003e\n        \u003carticle class=\"testi\" data-placeholder=\"\"\u003e\n          \u003cp\u003e\"SENZAI gave us something we didn\u0027t have before — a single place where business intent and technical execution stay in sync. From the first idea to the deployed outcome.\"\u003c/p\u003e\n          \u003cdiv class=\"testi-who\"\u003eJames Kirk\u003c/div\u003e\n          \u003cdiv class=\"testi-role\"\u003eCTO, Global Healthcare Enterprise\u003c/div\u003e\n        \u003c/article\u003e\n        \u003carticle class=\"testi\" data-placeholder=\"\"\u003e\n          \u003cp\u003e\"The governance piece changed how we operate. Every agent that ships has a traceable Blueprint behind it. Our compliance team finally trusts what engineering is building.\"\u003c/p\u003e\n          \u003cdiv class=\"testi-who\"\u003eMarcus Chen\u003c/div\u003e\n          \u003cdiv class=\"testi-role\"\u003eVP Engineering, Payor Major\u003c/div\u003e\n        \u003c/article\u003e\n        \u003carticle class=\"testi\" data-placeholder=\"\"\u003e\n          \u003cp\u003e\"We went from a 12-week delivery cycle to a full runnable POC in days. The second build was faster than the first. The Marketplace is the part nobody else has thought about.\"\u003c/p\u003e\n          \u003cdiv class=\"testi-who\"\u003eJohn Smith\u003c/div\u003e\n          \u003cdiv class=\"testi-role\"\u003eHead of AI, Major Healthcare Group\u003c/div\u003e\n        \u003c/article\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"placeholder-note\"\u003e\n\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/section\u003e\n\n\n  \u003c!-- CTA --\u003e\n  \u003csection class=\"stage stage-cta\" data-stage-id=\"cta\" id=\"cta\"\u003e\n    \u003cdiv class=\"stage-inner cta-inner\"\u003e\n      \u003cdiv class=\"eyebrow\"\u003eSENZAI\u003c/ s=\"foot-copy\"\u003e© 2026 Infinite Computer Solutions\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/footer\u003e\n\n\u003c/main\u003e\n\n\u003cscript src=\"7ef13453-3769-453d-8b24-09b3e2c0ce79\"\u003e\u003c/script\u003e\n\n\n\n\u003cscript\u003e\n(function(){\n  var nav = document.querySelector(\u0027[data-nav]\u0027);\n  var btn = document.querySelector(\u0027.nav-mob-toggle\u0027);\n  if (!btn || !nav) return;\n  btn.addEventListener(\u0027click\u0027, function(){\n    var open = nav.classList.toggle(\u0027nav-mob-open\u0027);\n    btn.setAttribute(\u0027aria-expanded\u0027, open ? \u0027true\u0027 : \u0027false\u0027);\n  });\n  document.querySelectorAll(\u0027.nav-links a\u0027).forEach(function(a){\n    a.addEventListener(\u0027click\u0027, function(){\n      nav.classList.remove(\u0027nav-mob-open\u0027);\n      btn.setAttribute(\u0027aria-expanded\u0027, \u0027false\u0027);\n    });\n  });\n})();\n\u003c/script\u003e\n\u003cscript\u003e\n(function(){\n  var els = document.querySelectorAll(\u0027.accel-num\u0027);\n  if (!els.length) return;\n  var obs = new IntersectionObserver(function(entries){\n    entries.forEach(function(e){\n      if (!e.isIntersecting) return;\n      var el = e.target;\n      var target = +el.dataset.val;\n      var cur = 0;\n      var steps = 48;\n      var step = target / steps;\n      var timer = setInterval(function(){\n        cur = Math.min(cur + step, target);\n        el.textContent = Math.round(cur);\n        if (cur \u003e= target) clearInterval(timer);\n      }, 28);\n      obs.unobserve(el);\n    });\n  }, { threshold: 0.6 });\n  els.forEach(function(el){ obs.observe(el); });\n})();\n\u003c/script\u003e\n\u003c/body\u003e\u003c/html\u003e"</script>
